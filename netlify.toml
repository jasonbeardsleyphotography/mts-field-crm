[build]
  command = "npm install && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY,VITE_GOOGLE_MAPS_KEY,VITE_GOOGLE_CLIENT_ID,VITE_GEMINI_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
